services:
  app:
    image: myapp:latest
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: myapp
    env_file: .env
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - myappnet
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  db:
    image: postgres:18
    container_name: myapp_db
    user: "${UID}:${GID}"
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ../../db/data:/var/lib/postgresql
      - ../../db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - myappnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  myappnet:

