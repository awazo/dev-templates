[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

[FILTER]
    Name   docker
    Match  docker.*
    Merge_Log On
    Keep_Log Off

[FILTER]
    Name   modify
    Match  docker.*
    Add    host ${HOSTNAME}

[OUTPUT]
    Name   loki
    Match  docker.*
    Host   192.168.xxx.yyy
    Port   3100
    Labels job=myapp,host=${HOSTNAME}
    Line_Format json

